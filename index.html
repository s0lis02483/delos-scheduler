function mkTheme(dark, primaryColor, appointmentColor) {
  const blue  = primaryColor      || '#0E76BC';
  const green = appointmentColor  || '#1A9B5C';
  return {
    bg:          dark ? '#111111' : '#ffffff',
    bgSoft:      dark ? '#1C1C1E' : '#F9F9F9',
    bgMid:       dark ? '#2C2C2E' : '#F0F0F0',
    bgDeep:      dark ? '#3A3A3C' : '#E0E0E0',
    border:      dark ? '#2C2C2E' : '#F0F0F0',
    borderSoft:  dark ? '#222222' : '#F5F5F5',
    borderInput: dark ? '#3A3A3C' : '#E0E0E0',
    text:        dark ? '#F2F2F7' : '#111111',
    textSub:     dark ? '#AEAEB2' : '#555555',
    textMuted:   dark ? '#636366' : '#AAAAAA',
    textFaint:   dark ? '#3A3A3C' : '#CCCCCC',
    blue, green,
    blueBg:      dark ? '#0E76BC28' : '#EBF4FB',
    greenBg:     dark ? '#1A9B5C28' : '#EDFBF4',
    blueAmt:     blue + '22',
    shadow:      dark ? '0 2px 24px rgba(0,0,0,0.6)' : '0 2px 24px rgba(0,0,0,0.07)',
    sheetShadow: dark ? '0 -4px 40px rgba(0,0,0,0.5)' : '0 -4px 40px rgba(0,0,0,0.12)',
    isDark: dark,
  };
}

// ─── Helpers ──────────────────────────────────────────────────────────────────

function getToday() { const d=new Date(); return new Date(d.getFullYear(),d.getMonth(),d.getDate()); }
function dateKey(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function addDays(d,n) { const x=new Date(d); x.setDate(x.getDate()+n); return x; }
function startOfWeek(d) { const x=new Date(d); const day=x.getDay(); x.setDate(x.getDate()-(day===0?6:day-1)); return x; }
function fmt12(minutes) { const h=Math.floor(minutes/60),m=minutes%60,ap=h>=12?'PM':'AM',hh=h>12?h-12:h===0?12:h; return `${hh}:${String(m).padStart(2,'0')} ${ap}`; }
function fmtHour(h) { const ap=h>=12?'PM':'AM',hh=h>12?h-12:h===0?12:h; return `${hh} ${ap}`; }
function sameDay(a,b) { return dateKey(a)===dateKey(b); }
function hasOverlap(as,ae,bs,be) { return as<be && ae>bs; }
function checkConflict(bookings,type,date,start,end,userId) {
  return bookings.filter(b => {
    if (b.date!==date) return false;
    if (type==='car') return b.type==='car' && hasOverlap(start,end,b.start,b.end);
    if (type==='appointment') return b.type==='appointment' && b.userId===userId && hasOverlap(start,end,b.start,b.end);
    return false;
  });
}
function nextFreeSlot(bookings,type,date,duration,userId,startFrom) {
  for (let s=startFrom; s+duration<=20*60; s+=30)
    if (checkConflict(bookings,type,date,s,s+duration,userId).length===0) return s;
  return null;
}
function greet(t) {
  const h=new Date().getHours();
  return h<12?t.goodMorning:h<17?t.goodAfternoon:t.goodEvening;
}

    e.preventDefault();
    setNameMsg(null);
    const n = nameInput.trim();
    if (!n) { setNameMsg({ok:false, text:t.displayNameEmpty}); return; }
    const initials = n.split(' ').map(p=>p[0]).join('').toUpperCase().slice(0,2);
    const {error} = await sb.from('app_users').update({name:n, initials}).eq('id', user.id);
    if (error) { setNameMsg({ok:false, text:error.message}); return; }
    user.name = n; user.initials = initials;
    USERS = USERS.map(u => u.id===user.id ? {...u, name:n, initials} : u);
    setUsers(prev => prev.map(u => u.id===user.id ? {...u, name:n, initials} : u));
    setNameInput('');
    setNameMsg({ok:true, text:t.displayNameSaved}); setTimeout(()=>setNameMsg(null), 3000);
  }

  async function handleChangePassword(e) {
    e.preventDefault();
    setPwMsg(null);
    if (curPw !== user.password) { setPwMsg({ok:false, text:t.pwWrongCurrent}); return; }
    if (newPw.length < 6)        { setPwMsg({ok:false, text:t.pwTooShort});     return; }

    user.password = newPw;
    setCurPw(''); setNewPw(''); setConPw('');
    setPwMsg({ok:true, text:t.pwSaved}); setTimeout(()=>setPwMsg(null), 3000);

    await sb.from('app_users').delete().eq('id', u.id);

    setAdding(true);

// ─── Booking Sheet ────────────────────────────────────────────────────────────

function BookingSheet({ slot, user, bookings, onBook, onClose, tweaks, c, t }) {
  const [duration, setDuration] = useState(tweaks.slotDuration||60);
  const [note, setNote] = useState('');
  if (!slot) return null;

  const start=slot.hour*60+slot.minute, end=start+duration, dk=dateKey(slot.date);
  const carConflicts=checkConflict(bookings,'car',dk,start,end,user.id);
  const apptConflicts=checkConflict(bookings,'appointment',dk,start,end,user.id);
  const carBlocked=carConflicts.length>0, apptBlocked=apptConflicts.length>0;
  const nextCar=carBlocked?nextFreeSlot(bookings,'car',dk,duration,user.id,start):null;
  const nextAppt=apptBlocked?nextFreeSlot(bookings,'appointment',dk,duration,user.id,start):null;
  const dayName=t.daysFull[slot.date.getDay()===0?6:slot.date.getDay()-1];
  const dateStr=`${dayName}, ${t.months[slot.date.getMonth()]} ${slot.date.getDate()}`;

  function book(type) {
    if (type==='car'&&carBlocked||type==='appointment'&&apptBlocked) return;
    onBook({ type, date:dk, start, end, note:note.trim(), userId:user.id });
  }

  return (
    <>
      <div className="sheet-backdrop" onClick={onClose}/>
      <div style={{ position:'fixed', bottom:0, left:0, right:0, background:c.bgSoft, borderRadius:'20px 20px 0 0', zIndex:51, padding:`0 0 env(safe-area-inset-bottom, 16px)`, boxShadow:c.sheetShadow }}>
        <div className="sheet-handle" style={{ background:c.bgDeep }}/>
        <div style={{ padding:'20px 20px 8px' }}>
          <div style={{ display:'flex', alignItems:'flex-start', justifyContent:'space-between', marginBottom:4 }}>
            <div>
              <p style={{ fontSize:13, color:c.textMuted, fontWeight:500 }}>{dateStr}</p>
              <p style={{ fontSize:20, fontWeight:700, color:c.text, marginTop:2 }}>{fmt12(start)} <span style={{ color:c.textMuted, fontWeight:400 }}>→</span> {fmt12(end)}</p>
            </div>
            <button onClick={onClose} style={{ background:c.bgMid, borderRadius:50, width:32, height:32, display:'flex', alignItems:'center', justifyContent:'center', color:c.textSub }}>
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/></svg>
            </button>
          </div>

          <div style={{ display:'flex', gap:6, marginTop:16, marginBottom:20, alignItems:'center' }}>
            <p style={{ fontSize:12, color:c.textMuted, marginRight:4 }}>{t.duration}</p>
            {[30,60,90,120].map(d => (
              <button key={d} onClick={()=>setDuration(d)}
                style={{ padding:'5px 12px', borderRadius:20, border:`1.5px solid ${duration===d?c.blue:c.borderInput}`, background:duration===d?c.blue:c.bg, color:duration===d?'#fff':c.textSub, fontSize:12, fontWeight:600, cursor:'pointer', transition:'all 0.15s' }}>
                {t.dur[d]}
              </button>
            ))}
          </div>

          <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
            <div>
              <button onClick={()=>book('car')} disabled={carBlocked}
                style={{ width:'100%', padding:'16px', borderRadius:14, border:'none', background:carBlocked?c.bgMid:c.blue, color:carBlocked?c.textMuted:'#fff', fontSize:16, fontWeight:600, cursor:carBlocked?'not-allowed':'pointer', display:'flex', alignItems:'center', gap:12 }}>
                <span style={{ fontSize:22 }}>🚗</span>
                <div style={{ textAlign:'left' }}>
                  <div>{t.carBooking}</div>
                  {carBlocked && <div style={{ fontSize:12, fontWeight:400, opacity:0.7, marginTop:1 }}>{t.bookedBy} {USERS.find(u=>u.id===carConflicts[0]?.userId)?.name||'?'}</div>}
                </div>
                {!carBlocked && <svg style={{ marginLeft:'auto' }} width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M7 10h6M10 7l3 3-3 3" stroke="white" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                {carBlocked && <span style={{ marginLeft:'auto', fontSize:18 }}>🔒</span>}
              </button>
              {carBlocked&&nextCar&&<p style={{ fontSize:12, color:c.textMuted, marginTop:6, paddingLeft:4 }}>{t.nextAvailable} <span style={{ color:c.blue, fontWeight:600 }}>{fmt12(nextCar)}</span></p>}
            </div>
            <div>
              <button onClick={()=>book('appointment')} disabled={apptBlocked}
                style={{ width:'100%', padding:'16px', borderRadius:14, border:'none', background:apptBlocked?c.bgMid:c.green, color:apptBlocked?c.textMuted:'#fff', fontSize:16, fontWeight:600, cursor:apptBlocked?'not-allowed':'pointer', display:'flex', alignItems:'center', gap:12 }}>
                <span style={{ fontSize:22 }}>📋</span>
                <div style={{ textAlign:'left' }}>
                  <div>{t.appointment}</div>
                  {apptBlocked&&<div style={{ fontSize:12, fontWeight:400, opacity:0.7, marginTop:1 }}>{t.alreadyBooked}</div>}
                </div>
                {!apptBlocked && <svg style={{ marginLeft:'auto' }} width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M7 10h6M10 7l3 3-3 3" stroke="white" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                {apptBlocked && <span style={{ marginLeft:'auto', fontSize:18 }}>🔒</span>}
              </button>
              {apptBlocked&&nextAppt&&<p style={{ fontSize:12, color:c.textMuted, marginTop:6, paddingLeft:4 }}>{t.nextAvailable} <span style={{ color:c.green, fontWeight:600 }}>{fmt12(nextAppt)}</span></p>}

          </div>
        </div>
      </div>
    </>
  );
}

// ─── Today Panel ──────────────────────────────────────────────────────────────

function TodayPanel({ user, bookings, tweaks, today, onGoCalendar, c, t }) {
  const dk=dateKey(today);
  const now=new Date(), nowMin=now.getHours()*60+now.getMinutes();
  const myToday=bookings.filter(b=>b.date===dk&&b.userId===user.id).sort((a,b)=>a.start-b.start);
  const upcoming=myToday.filter(b=>b.end>nowMin);
  const past=myToday.filter(b=>b.end<=nowMin);

  const [todos, setTodos]=useState([]);
  const [newTodo, setNewTodo]=useState('');

  useEffect(()=>{
    sb.from('todos').select('*').eq('user_id',user.id).order('created_at').then(({data})=>{ if(data) setTodos(data.map(r=>({id:r.id,text:r.text,done:r.done}))); });
    const ch=sb.channel('todos-'+user.id).on('postgres_changes',{event:'*',schema:'public',table:'todos',filter:`user_id=eq.${user.id}`},(p)=>{
      if(p.eventType==='INSERT') setTodos(prev=>prev.some(t=>t.id===p.new.id)?prev:[...prev,{id:p.new.id,text:p.new.text,done:p.new.done}]);
      if(p.eventType==='UPDATE') setTodos(prev=>prev.map(t=>t.id===p.new.id?{...t,done:p.new.done}:t));
      if(p.eventType==='DELETE') setTodos(prev=>prev.filter(t=>t.id!==p.old.id));
    }).subscribe();
    return ()=>sb.removeChannel(ch);
  },[user.id]);

  function addTodo(e) { e.preventDefault(); const tx=newTodo.trim(); if(!tx)return; const id=`t${Date.now()}`; setTodos(p=>[...p,{id,text:tx,done:false}]); sb.from('todos').insert({id,user_id:user.id,text:tx,done:false}); setNewTodo(''); }
  function toggleTodo(id) { setTodos(p=>p.map(t=>t.id===id?{...t,done:!t.done}:t)); sb.from('todos').update({done:todos.find(t=>t.id===id)?.done===false?true:false}).eq('id',id); }
  function deleteTodo(id) { setTodos(p=>p.filter(t=>t.id!==id)); sb.from('todos').delete().eq('id',id); }

  const dayIdx=today.getDay()===0?6:today.getDay()-1;
  const dateStr=`${t.daysFull[dayIdx]}, ${t.months[today.getMonth()]} ${today.getDate()}`;

  const EventRow=({b,dim})=>{
    const isCar=b.type==='car', color=isCar?c.blue:c.green;
    return (
      <div style={{ display:'flex', gap:12, alignItems:'flex-start', opacity:dim?0.4:1, padding:'10px 0', borderBottom:`1px solid ${c.borderSoft}` }}>
        <div style={{ width:32, height:32, borderRadius:10, background:isCar?c.blueBg:c.greenBg, display:'flex', alignItems:'center', justifyContent:'center', fontSize:16, flexShrink:0 }}>
          {isCar?'🚗':'📋'}
        </div>
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ fontSize:13, fontWeight:600, color:c.text, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>
            {b.note||(isCar?t.carBooking:t.appointment)}
          </div>
          <div style={{ fontSize:12, color:c.textMuted, marginTop:2 }}>{fmt12(b.start)} – {fmt12(b.end)}</div>
        </div>
        <div style={{ width:8, height:8, borderRadius:'50%', background:color, flexShrink:0, marginTop:6 }}/>
      </div>
    );
  };

  return (
    <div style={{ flex:1, overflowY:'auto', padding:'20px 16px', display:'flex', flexDirection:'column', gap:24, background:c.bg }}>
      <div>
        <p style={{ fontSize:13, color:c.textMuted, fontWeight:500 }}>{dateStr}</p>
        <h2 style={{ fontSize:22, fontWeight:700, color:c.text, marginTop:4, letterSpacing:'-0.4px' }}>
          {greet(t)}, {user.name.split(' ')[0]} 👋
        </h2>
      </div>

      <div>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:4 }}>
          <p style={{ fontSize:12, fontWeight:700, color:c.textMuted, textTransform:'uppercase', letterSpacing:'0.06em' }}>{t.upcoming}</p>
        </div>
        {upcoming.length===0&&past.length===0&&(
          <div style={{ padding:'24px 0', textAlign:'center' }}>
            <div style={{ fontSize:28, marginBottom:8 }}>📅</div>
            <p style={{ fontSize:13, color:c.textMuted }}>{t.noBookings}</p>
            <button onClick={onGoCalendar} style={{ marginTop:12, padding:'8px 16px', background:c.blue, color:'#fff', border:'none', borderRadius:20, fontSize:12, fontWeight:600, cursor:'pointer' }}>
              {t.addBooking}
            </button>
          </div>
        )}
        {upcoming.map(b=><EventRow key={b.id} b={b} dim={false}/>)}
        {past.length>0&&upcoming.length>0&&(
          <p style={{ fontSize:11, color:c.textFaint, textTransform:'uppercase', letterSpacing:'0.06em', margin:'12px 0 4px', fontWeight:600 }}>{t.earlier}</p>
        )}
        {past.map(b=><EventRow key={b.id} b={b} dim={true}/>)}
      </div>

      <div>
        <p style={{ fontSize:12, fontWeight:700, color:c.textMuted, textTransform:'uppercase', letterSpacing:'0.06em', marginBottom:8 }}>{t.myTodos}</p>
        {todos.length>0&&(
          <div style={{ marginBottom:10 }}>
            {todos.map(todo=>(
              <div key={todo.id} style={{ display:'flex', alignItems:'center', gap:10, padding:'9px 0', borderBottom:`1px solid ${c.borderSoft}` }}>
                <button onClick={()=>toggleTodo(todo.id)}
                  style={{ width:20, height:20, borderRadius:6, border:`2px solid ${todo.done?c.blue:c.bgDeep}`, background:todo.done?c.blue:c.bg, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0, cursor:'pointer', padding:0, transition:'all 0.15s' }}>
                  {todo.done&&<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 5l2.5 2.5L8 3" stroke="white" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                </button>
                <span style={{ flex:1, fontSize:13, color:todo.done?c.textMuted:c.text, textDecoration:todo.done?'line-through':'none', lineHeight:1.4 }}>{todo.text}</span>
                <button onClick={()=>deleteTodo(todo.id)} style={{ background:'none', border:'none', color:c.textMuted, cursor:'pointer', padding:'2px 4px', fontSize:16, lineHeight:1 }}>×</button>
              </div>
            ))}
          </div>
        )}
        <form onSubmit={addTodo} style={{ display:'flex', gap:8 }}>
          <input value={newTodo} onChange={e=>setNewTodo(e.target.value)} placeholder={t.addTodo}
            style={{ flex:1, padding:'9px 12px', border:`1.5px solid ${c.borderInput}`, borderRadius:10, fontSize:13, color:c.text, background:c.bgSoft }}
            onFocus={e=>e.target.style.borderColor=c.blue} onBlur={e=>e.target.style.borderColor=c.borderInput}/>
          <button type="submit" style={{ padding:'9px 14px', background:c.blue, color:'#fff', border:'none', borderRadius:10, fontSize:18, fontWeight:600, cursor:'pointer', lineHeight:1 }}>+</button>
        </form>
      </div>
    </div>
  );
}

// ─── Calendar Grid ────────────────────────────────────────────────────────────

function CalendarGrid({ view, weekStart, focusDate, bookings, onSlotClick, user, tweaks, today, users, c, t }) {
  const startH=tweaks.startHour||7, endH=tweaks.endHour||20, slotH=52, timeW=52;
  const days=view==='week'?Array.from({length:7},(_,i)=>addDays(weekStart,i)):[focusDate];
  const hours=[]; for(let h=startH;h<=endH;h++) hours.push(h);
  const totalH=(endH-startH)*2*slotH;
  function minutesToY(m) { return ((m-startH*60)/30)*slotH; }
  const now=new Date(), nowY=minutesToY(now.getHours()*60+now.getMinutes());

  return (
    <div style={{ flex:1, overflow:'hidden', display:'flex', flexDirection:'column', background:c.bg }}>
      <div style={{ display:'flex', borderBottom:`1px solid ${c.border}`, background:c.bg, flexShrink:0 }}>
        <div style={{ width:timeW, flexShrink:0 }}/>
        {days.map((d,i)=>{
          const isToday=sameDay(d,today), dayIdx=d.getDay()===0?6:d.getDay()-1;
          return (
            <div key={i} style={{ flex:1, textAlign:'center', padding:'10px 4px 8px', minWidth:0 }}>
              <div style={{ fontSize:11, fontWeight:600, color:isToday?c.blue:c.textMuted, letterSpacing:'0.06em', textTransform:'uppercase' }}>{t.days[dayIdx]}</div>
              <div style={{ fontSize:view==='week'?18:22, fontWeight:700, color:isToday?'#fff':c.text, width:view==='week'?30:38, height:view==='week'?30:38, borderRadius:'50%', display:'flex', alignItems:'center', justifyContent:'center', margin:'3px auto 0', background:isToday?c.blue:'transparent' }}>
                {d.getDate()}
              </div>
            </div>
          );
        })}
      </div>

      <div style={{ flex:1, overflowY:'auto', overflowX:view==='week'?'auto':'hidden' }}>
        <div style={{ display:'flex', position:'relative', minWidth:view==='week'?`${timeW+days.length*120}px`:'auto' }}>
          <div style={{ width:timeW, flexShrink:0, position:'relative', height:totalH+slotH }}>
            {hours.map(h=>(
              <div key={h} style={{ position:'absolute', top:minutesToY(h*60)-8, left:0, right:0, textAlign:'right', paddingRight:10, fontSize:11, color:c.textFaint, fontWeight:500 }}>
                {fmtHour(h)}
              </div>
            ))}
          </div>
          {days.map((d,di)=>{
            const dk=dateKey(d), dayBkgs=bookings.filter(b=>b.date===dk), isToday=sameDay(d,today);
            return (
              <div key={di} style={{ flex:1, position:'relative', height:totalH+slotH, borderLeft:`1px solid ${c.border}`, minWidth:view==='week'?120:0 }}>
                {hours.map(h=>(
                  <div key={h} style={{ position:'absolute', top:minutesToY(h*60), left:0, right:0, borderTop:h===startH?'none':`1px solid ${c.borderSoft}`, pointerEvents:'none' }}/>
                ))}
                {Array.from({length:(endH-startH)*2},(_,i)=>{
                  const ss=(startH*60)+i*30;
                  const hasAny=dayBkgs.some(b=>hasOverlap(ss,ss+30,b.start,b.end));
                  return (
                    <div key={i} onClick={()=>onSlotClick({date:d,hour:Math.floor(ss/60),minute:ss%60})}
                      style={{ position:'absolute', top:minutesToY(ss), left:2, right:2, height:slotH-1, cursor:'pointer', zIndex:1, borderRadius:4, transition:'background 0.1s' }}
                      onMouseEnter={e=>{ if(!hasAny) e.currentTarget.style.background=c.isDark?'#ffffff0a':'#F5F9FD'; }}
                      onMouseLeave={e=>e.currentTarget.style.background='transparent'}/>
                  );
                })}
                {dayBkgs.map(b=>{
                  const top=minutesToY(b.start), height=((b.end-b.start)/30)*slotH-3;
                  const owner=users.find(u=>u.id===b.userId), isCar=b.type==='car';
                  const bg=isCar?c.blue:c.green;
                  return (
                    <div key={b.id} style={{ position:'absolute', top, left:4, right:4, height, background:isCar?c.blueBg:c.greenBg, border:`1.5px solid ${bg}22`, borderLeft:`3px solid ${bg}`, borderRadius:8, padding:'5px 8px', zIndex:2, overflow:'hidden', cursor:'default', boxSizing:'border-box' }}>
                      <div style={{ fontSize:11, fontWeight:700, color:bg, lineHeight:1.3 }}>
                        {isCar?'🚗':'📋'} {b.note||(isCar?t.carBooking:t.appointment)}
                      </div>
                      {height>35&&<div style={{ fontSize:10, color:bg, opacity:0.7, marginTop:2 }}>{owner?.name} · {fmt12(b.start)}</div>}
                    </div>
                  );
                })}
                {isToday&&(
                  <div style={{ position:'absolute', top:nowY, left:0, right:0, zIndex:5, pointerEvents:'none' }}>
                    <div style={{ height:2, background:c.blue, position:'relative' }}>
                      <div style={{ position:'absolute', left:-4, top:-4, width:10, height:10, borderRadius:'50%', background:c.blue }}/>
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ─── Calendar View ────────────────────────────────────────────────────────────

function CalendarView({ user, bookings, setBookings, tweaks, today, setSlot, slot, users, c, t }) {
  const [view, setView]=useState('week');
  const [weekStart, setWeekStart]=useState(startOfWeek(today));
  const [focusDay, setFocusDay]=useState(today);
  const [toast, setToast]=useState(null);
  const [filterUser, setFilterUser]=useState('all');
  const [showPicker, setShowPicker]=useState(false);

  function showToast(msg,color) { setToast({msg,color}); setTimeout(()=>setToast(null),2400); }
  async function handleBook({type,date,start,end,note,userId}) {
    const b={id:`b${Date.now()}`,type,userId,date,start,end,note};
    setBookings(prev=>[...prev,b]);
    setSlot(null);
    const {error} = await sb.from('bookings').insert(bookingToDb(b));
    if(error) {
      setBookings(prev=>prev.filter(x=>x.id!==b.id));
      showToast('❌ ' + error.message, '#FF3B30');
      return;
    }
    showToast(type==='car'?`🚗 ${t.carBooking}!`:`📋 ${t.appointment}!`, type==='car'?tweaks.primaryColor:tweaks.appointmentColor);
  }

  const blue=tweaks.primaryColor||'#0E76BC';
  const filteredBookings = filterUser==='all' ? bookings : bookings.filter(b=>b.userId===filterUser);
  const weekEnd=addDays(weekStart,6);
  const navLabel=view==='week'
    ?`${t.months[weekStart.getMonth()].slice(0,3)} ${weekStart.getDate()} – ${weekEnd.getMonth()!==weekStart.getMonth()?t.months[weekEnd.getMonth()].slice(0,3)+' ':''}${weekEnd.getDate()}, ${weekEnd.getFullYear()}`
    :`${t.daysFull[focusDay.getDay()===0?6:focusDay.getDay()-1]}, ${t.months[focusDay.getMonth()]} ${focusDay.getDate()}`;

  return (
    <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden', minHeight:0, background:c.bg }}>
      <div style={{ display:'flex', alignItems:'center', padding:'8px 12px', borderBottom:`1px solid ${c.border}`, flexShrink:0, gap:4, background:c.bg }}>
        <div style={{ display:'flex', background:c.bgMid, borderRadius:8, padding:3, gap:2 }}>
          {['week','day'].map(v=>(
            <button key={v} onClick={()=>setView(v)}
              style={{ padding:'5px 10px', borderRadius:6, border:'none', background:view===v?c.bg:'transparent', color:view===v?c.text:c.textMuted, fontWeight:600, fontSize:11, cursor:'pointer', boxShadow:view===v?`0 1px 4px rgba(0,0,0,${c.isDark?0.4:0.1})`:'none', transition:'all 0.15s', textTransform:'capitalize' }}>
              {v==='week'?t.week:t.day}
            </button>
          ))}
        </div>
        <div style={{ position:'relative', marginLeft:4 }}>
          <button onClick={()=>setShowPicker(p=>!p)}
            style={{ height:32, padding:'0 10px', borderRadius:8, border:`1.5px solid ${filterUser==='all'?c.border:c.blue}`, background:filterUser==='all'?c.bgMid:c.blueBg, color:filterUser==='all'?c.textSub:c.blue, fontSize:12, fontWeight:600, cursor:'pointer', display:'flex', alignItems:'center', gap:6, whiteSpace:'nowrap' }}>
            {filterUser==='all'
              ? <><span style={{fontSize:14}}>👥</span> {t.everyone}</>
              : <><span style={{ width:20, height:20, borderRadius:'50%', background:c.blue, color:'#fff', fontSize:9, fontWeight:700, display:'inline-flex', alignItems:'center', justifyContent:'center' }}>{users.find(u=>u.id===filterUser)?.initials}</span> {users.find(u=>u.id===filterUser)?.name.split(' ')[0]}</>
            }
            <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 4l3 3 3-3" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
          </button>
          {showPicker&&<div onClick={()=>setShowPicker(false)} style={{ position:'fixed', inset:0, zIndex:49 }}/>}
          {showPicker&&(
            <div style={{ position:'absolute', top:36, left:0, background:c.bgSoft, border:`1px solid ${c.border}`, borderRadius:12, padding:6, zIndex:50, minWidth:160, boxShadow:c.shadow }}>
              {[{id:'all',name:t.everyone,initials:'👥'},...users].map(u=>(
                <button key={u.id} onClick={()=>{setFilterUser(u.id);setShowPicker(false);}}
                  style={{ display:'flex', alignItems:'center', gap:10, width:'100%', padding:'8px 10px', borderRadius:8, border:'none', background:filterUser===u.id?c.blueBg:'transparent', color:filterUser===u.id?c.blue:c.text, fontWeight:filterUser===u.id?600:400, fontSize:13, cursor:'pointer', textAlign:'left' }}>
                  {u.id==='all'
                    ? <span style={{fontSize:16}}>👥</span>
                    : <span style={{ width:24, height:24, borderRadius:'50%', background:c.blue+'33', color:c.blue, fontSize:9, fontWeight:700, display:'inline-flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>{u.initials}</span>
                  }
                  {u.name}
                  {filterUser===u.id&&<svg style={{marginLeft:'auto'}} width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                </button>
              ))}
            </div>
          )}
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:4, marginLeft:'auto' }}>
          <button onClick={()=>{ if(view==='week') setWeekStart(w=>addDays(w,-7)); else {const d=addDays(focusDay,-1);setFocusDay(d);setWeekStart(startOfWeek(d));} }}
            style={{ width:32, height:32, background:'none', border:'none', borderRadius:8, color:c.textSub, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', fontSize:18 }}>‹</button>
          <button onClick={()=>{ setWeekStart(startOfWeek(today)); setFocusDay(today); }}
            style={{ fontSize:14, fontWeight:600, color:c.text, background:'none', border:'none', cursor:'pointer', whiteSpace:'nowrap' }}>{navLabel}</button>
          <button onClick={()=>{ if(view==='week') setWeekStart(w=>addDays(w,7)); else {const d=addDays(focusDay,1);setFocusDay(d);setWeekStart(startOfWeek(d));} }}
            style={{ width:32, height:32, background:'none', border:'none', borderRadius:8, color:c.textSub, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', fontSize:18 }}>›</button>
        </div>
      </div>

      <CalendarGrid view={view} weekStart={weekStart} focusDate={focusDay} bookings={filteredBookings}
        onSlotClick={setSlot} user={user} tweaks={tweaks} today={today} users={users} c={c} t={t}/>

      <div style={{ display:'flex', gap:16, padding:'7px 16px', borderTop:`1px solid ${c.border}`, flexShrink:0, justifyContent:'center', background:c.bg }}>
        <div style={{ display:'flex', alignItems:'center', gap:6 }}><div style={{ width:8, height:8, borderRadius:2, background:c.blue }}/><span style={{ fontSize:11, color:c.textMuted }}>{t.carLegend}</span></div>
        <div style={{ display:'flex', alignItems:'center', gap:6 }}><div style={{ width:8, height:8, borderRadius:2, background:c.green }}/><span style={{ fontSize:11, color:c.textMuted }}>{t.apptLegend}</span></div>
      </div>

      {slot&&<BookingSheet slot={slot} user={user} bookings={bookings} onBook={handleBook} onClose={()=>setSlot(null)} tweaks={tweaks} c={c} t={t}/>}
      {toast&&<div style={{ position:'fixed', bottom:32, left:'50%', transform:'translateX(-50%)', background:toast.color, color:'#fff', padding:'10px 20px', borderRadius:50, fontSize:14, fontWeight:600, zIndex:100, whiteSpace:'nowrap', boxShadow:'0 4px 20px rgba(0,0,0,0.2)', pointerEvents:'none' }}>{toast.msg}</div>}
    </div>
  );
}

// ─── Main App ─────────────────────────────────────────────────────────────────

function MainApp({ user, onLogout, tweaks, showTweaks, dark, lang, onToggleDark, onToggleLang, users, setUsers }) {
  const today=useMemo(()=>getToday(),[]);
  const [activeTab, setActiveTab]=useState('today');
  const [bookings, setBookings]=useState([]);
  const [slot, setSlot]=useState(null);
  const [showSettings, setShowSettings]=useState(false);

  useEffect(()=>{
    sb.from('bookings').select('*').then(({data,error})=>{ if(data) setBookings(data.map(dbToBooking)); });
    const ch=sb.channel('bookings-all').on('postgres_changes',{event:'*',schema:'public',table:'bookings'},(p)=>{
      if(p.eventType==='INSERT') setBookings(prev=>prev.some(b=>b.id===p.new.id)?prev:[...prev,dbToBooking(p.new)]);
      if(p.eventType==='UPDATE') setBookings(prev=>prev.map(b=>b.id===p.new.id?dbToBooking(p.new):b));
      if(p.eventType==='DELETE') setBookings(prev=>prev.filter(b=>b.id!==p.old.id));
    }).subscribe();
    return ()=>sb.removeChannel(ch);
  },[]);

  const t=T[lang]||T.en;
  const c=useMemo(()=>mkTheme(dark, tweaks.primaryColor, tweaks.appointmentColor),[dark, tweaks.primaryColor, tweaks.appointmentColor]);

  return (
    <div style={{ height:'100svh', background:c.bg, position:'relative', overflow:'hidden' }}>
    <div className="app-shell" style={{ height:'100%', display:'flex', flexDirection:'column', background:c.bg }}>
      <Sidebar user={user} bookings={bookings} tweaks={tweaks} today={today}
        activeTab={activeTab} setActiveTab={setActiveTab} onOpenSettings={()=>setShowSettings(true)} c={c} t={t}/>

      <div className="main-area" style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden', minHeight:0 }}>

        {activeTab==='today'&&<TodayPanel user={user} bookings={bookings} tweaks={tweaks} today={today} onGoCalendar={()=>setActiveTab('calendar')} c={c} t={t}/>}
        {activeTab==='calendar'&&<CalendarView user={user} bookings={bookings} setBookings={setBookings} tweaks={tweaks} today={today} setSlot={setSlot} slot={slot} users={users} c={c} t={t}/>}
      </div>

      {/* Mobile tab bar */}
      <div className="tab-bar" style={{ display:'flex', borderTop:`1px solid ${c.border}`, background:c.bg, flexShrink:0, paddingBottom:'env(safe-area-inset-bottom, 0)' }}>
        {[
          { id:'today', label:t.today, icon:(a)=><svg width="22" height="22" viewBox="0 0 22 22" fill="none"><rect x="2.5" y="3.5" width="17" height="15" rx="2.5" stroke={a?c.blue:'#888'} strokeWidth="1.6"/><path d="M2.5 8h17" stroke={a?c.blue:'#888'} strokeWidth="1.6"/><circle cx="11" cy="14" r="2.2" fill={a?c.blue:'#888'}/></svg> },
          { id:'calendar', label:t.calendar, icon:(a)=><svg width="22" height="22" viewBox="0 0 22 22" fill="none"><rect x="2.5" y="3.5" width="17" height="15" rx="2.5" stroke={a?c.blue:'#888'} strokeWidth="1.6"/><path d="M2.5 8h17" stroke={a?c.blue:'#888'} strokeWidth="1.6"/><path d="M7.5 3.5v4M14.5 3.5v4" stroke={a?c.blue:'#888'} strokeWidth="1.6" strokeLinecap="round"/><path d="M7 12.5h2.5M12 12.5h2.5M7 15.5h2.5M12 15.5h2.5" stroke={a?c.blue:'#888'} strokeWidth="1.4" strokeLinecap="round"/></svg> },
        ].map(tab=>(
          <button key={tab.id} className={`tab-btn${activeTab===tab.id?' active':''}`}
            onClick={()=>setActiveTab(tab.id)} style={{ color:activeTab===tab.id?c.blue:'#888' }}>
            {tab.icon(activeTab===tab.id)}{tab.label}
          </button>
        ))}
      </div>
    </div>

    {/* Settings page — slides over the whole app */}
    {showSettings&&(
      <SettingsPage user={user} dark={dark} lang={lang}
        onToggleDark={onToggleDark} onToggleLang={onToggleLang}
        onLogout={onLogout} onBack={()=>setShowSettings(false)} users={users} setUsers={setUsers} c={c} t={t}/>
    )}

    {showTweaks&&<TweaksPanel tweaks={tweaks} c={c} t={t}/>}
    </div>
  );
}

// ─── Tweaks Panel ─────────────────────────────────────────────────────────────

function TweaksPanel({ tweaks, c, t }) {
  function set(key,val) { window.parent.postMessage({type:'__edit_mode_set_keys',edits:{[key]:val}},'*'); }
  return (
    <div style={{ position:'fixed', bottom:80, right:16, background:c.bgSoft, borderRadius:16, padding:'16px', boxShadow:c.sheetShadow, zIndex:200, width:220, border:`1px solid ${c.border}` }}>
      <p style={{ fontSize:13, fontWeight:700, color:c.text, marginBottom:14 }}>Tweaks</p>
      <label style={{ display:'block', fontSize:11, color:c.textMuted, marginBottom:4, fontWeight:600, textTransform:'uppercase', letterSpacing:'0.05em' }}>Car color</label>
      <input type="color" value={tweaks.primaryColor} onChange={e=>set('primaryColor',e.target.value)} style={{ width:'100%', height:32, border:`1px solid ${c.borderInput}`, borderRadius:8, cursor:'pointer', marginBottom:12 }}/>
      <label style={{ display:'block', fontSize:11, color:c.textMuted, marginBottom:4, fontWeight:600, textTransform:'uppercase', letterSpacing:'0.05em' }}>Appointment color</label>
      <input type="color" value={tweaks.appointmentColor} onChange={e=>set('appointmentColor',e.target.value)} style={{ width:'100%', height:32, border:`1px solid ${c.borderInput}`, borderRadius:8, cursor:'pointer', marginBottom:12 }}/>
      <label style={{ display:'block', fontSize:11, color:c.textMuted, marginBottom:4, fontWeight:600, textTransform:'uppercase', letterSpacing:'0.05em' }}>Default duration</label>
      <select value={tweaks.slotDuration} onChange={e=>set('slotDuration',Number(e.target.value))} style={{ width:'100%', padding:'6px 10px', border:`1px solid ${c.borderInput}`, borderRadius:8, fontSize:13, color:c.text, background:c.bgSoft, cursor:'pointer' }}>
        {[30,60,90,120].map(d=><option key={d} value={d}>{t.durFull[d]}</option>)}
      </select>
    </div>
  );
}

// ─── Root App ─────────────────────────────────────────────────────────────────

function App() {
  const [user, setUser]=useState(null);
  const [users, setUsers]=useState(USERS);
  const [tweaks, setTweaks]=useState(TWEAK_DEFAULTS);
  const [showTweaks, setShowTweaks]=useState(false);
  const [dark, setDark]=useState(()=>localStorage.getItem('delos_dark')==='1');
  const [lang, setLang]=useState(()=>localStorage.getItem('delos_lang')||'sl');

  function toggleDark() { setDark(d=>{ const n=!d; localStorage.setItem('delos_dark',n?'1':'0'); return n; }); }
  function toggleLang(code) { setLang(code); localStorage.setItem('delos_lang',code); }

  useEffect(()=>{
    window.addEventListener('message',(e)=>{
      if (e.data?.type==='__activate_edit_mode')   setShowTweaks(true);
      if (e.data?.type==='__deactivate_edit_mode') setShowTweaks(false);
      if (e.data?.type==='__edit_mode_set_keys')   setTweaks(p=>({...p,...e.data.edits}));
    });
    window.parent.postMessage({type:'__edit_mode_available'},'*');

    sb.from('app_users').select('*').order('created_at').then(({data})=>{
      if(data&&data.length>0){ USERS=data; setUsers(data);
        const saved=localStorage.getItem('delos_user');
        if(saved){ const u=data.find(x=>x.id===saved); if(u) setUser(u); }
      } else {
        const saved=localStorage.getItem('delos_user');
        if(saved){ const u=USERS.find(x=>x.id===saved); if(u) setUser(u); }
      }
    });

    const ch=sb.channel('app-users-watch').on('postgres_changes',{event:'INSERT',schema:'public',table:'app_users'},(p)=>{
      USERS=[...USERS,p.new]; setUsers(prev=>[...prev,p.new]);
    }).subscribe();
    return ()=>sb.removeChannel(ch);
  },[]);

  function handleLogin(u)  { setUser(u); localStorage.setItem('delos_user',u.id); }
  function handleLogout()  { setUser(null); localStorage.removeItem('delos_user'); }

  const t=T[lang]||T.en;
  const c=useMemo(()=>mkTheme(dark, tweaks.primaryColor, tweaks.appointmentColor),[dark, tweaks.primaryColor, tweaks.appointmentColor]);

  if (!user) return <LoginScreen onLogin={handleLogin} users={users} c={c} t={t}/>;
  return <MainApp user={user} onLogout={handleLogout} tweaks={tweaks} showTweaks={showTweaks} dark={dark} lang={lang} onToggleDark={toggleDark} onToggleLang={toggleLang} users={users} setUsers={setUsers}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
